backend:
  name: github
  repo: alwahidi-clan/alwhidy-site
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "news"
    label: "الأخبار"
    folder: "_news"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "العنوان", name: "title", widget: "string"}
      - {label: "تاريخ النشر", name: "date", widget: "datetime"}
      - {label: "تفاصيل الخبر", name: "body", widget: "markdown"}
