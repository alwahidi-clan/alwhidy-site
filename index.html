<script>
  // كود سحب الأخبار من المجلد تلقائياً
  async function loadNews() {
    const container = document.getElementById('news-container');
    try {
      // هنا سيقوم النظام بالبحث في مجلد _news الذي ستنشئه اللوحة
      const response = await fetch('https://api.github.com/repos/alwahidi-clan/alwhidy-site/contents/_news');

      container.innerHTML = ''; 
      
      for (let file of files) {
        if (file.name.endsWith('.md')) {
          const contentRes = await fetch(file.download_url);
          const text = await contentRes.text();
