<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رابطة عشيرة الوحيدي | المنصة الرسمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #1a2a6c; --gold: #b38728; --dark: #0f172a; }
        body { font-family: 'Cairo', sans-serif; background-color: #f4f7f9; margin: 0; color: #333; }
        
        header {
            background: linear-gradient(rgba(26, 42, 108, 0.8), rgba(15, 23, 42, 0.9)), 
                        url('baner.jpg') no-repeat center center/cover;
            height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            border-bottom: 5px solid var(--gold);
        }

        .logo-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid var(--gold);
            background-color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        header h1 { font-size: 2.8rem; margin: 0; font-weight: 900; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }

        .news-section { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .section-title { border-right: 5px solid var(--main); padding-right: 15px; margin-bottom: 30px; color: var(--main); text-align: right; }
        
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .contact-card {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.3rem;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .contact-card:hover { transform: translateY(-5px); filter: brightness(1.1); }

        .whatsapp { background-color: #25D366; } 
        .email { background-color: #EA4335; }    
        .phone { background-color: #34a853; }    

        footer { background: #000; color: #888; text-align: center; padding: 25px; margin-top: 60px; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <img src="logo.jpg" alt="شعار الوحيدي" class="logo-img">
    <h1>رابطة عشيرة الوحيدي</h1>
    <p style="color: var(--gold); font-weight: bold; font-size: 1.2rem;">المنصة الرسمية للأخبار والتواصل</p>
</header>

<div class="container">
    <div class="news-section">
        <h2 class="section-title">آخر الأخبار والمستجدات</h2>
        <div style="background: #fdfdfd; padding: 40px; border: 2px dashed #e0e0e0; border-radius: 15px;">
            <p style="color: #666; font-size: 1.1rem;">أهلاً بكم في موقع الرابطة. سيتم نشر الأخبار والمناسبات هنا قريباً.</p>
        </div>
    </div>

    <h2 class="section-title" style="margin-top: 50px;">قنوات التواصل الرسمية (ديوان الرابطة)</h2>
    <div class="contact-grid">
        <a href="https://wa.me/970567778040" class="contact-card whatsapp" target="_blank">
             واتساب الرابطة
        </a>

        <a href="mailto:hasanalwhidy122@gmail.com" class="contact-card email">
             البريد الإلكتروني
        </a>

        <a href="tel:+970567778040" class="contact-card phone">
             اتصال هاتفي
        </a>
    </div>
</div>

<footer>
    &copy; 2024 جميع الحقوق محفوظة | رابطة عشيرة الوحيدي
</footer>

</body>
</html>
