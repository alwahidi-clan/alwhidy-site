<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رابطة عشيرة الوحيدي | المنصة الرسمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #1a2a6c; --gold: #b38728; --dark: #0f172a; }
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; margin: 0; color: #333; }
        
        /* الهيدر باستخدام البانر الخاص بك */
        header {
            background: linear-gradient(rgba(26, 42, 108, 0.8), rgba(15, 23, 42, 0.9)), 
                        url('baner.jpg') no-repeat center center/cover;
            height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        /* تنسيق الشعار ليكون بدون خلفية بيضاء مزعجة */
        .logo-img {
            width: 140px;
            height: auto;
            border-radius: 50%; /* لجعل الشعار دائري إذا كان له خلفية */
            margin-bottom: 15px;
            border: 3px solid var(--gold);
        }

        header h1 { font-size: 3rem; margin: 0; font-weight: 900; }
        header p { font-size: 1.2rem; color: var(--gold); margin-top: 5px; }

        .container { max-width: 1100px; margin: -40px auto 40px; padding: 0 20px; }

        /* قسم الأخبار الرسمية */
        .news-section { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .section-title { border-right: 5px solid var(--main); padding-right: 15px; margin-bottom: 30px; color: var(--main); }
        
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .news-item { border: 1px solid #eee; padding: 20px; border-radius: 10px; transition: 0.3s; }
        .news-item:hover { border-color: var(--gold); background: #fefcf6; }

        /* قسم التواصل الاجتماعي (مثل الصورة 6310) */
        .contact-section { background: var(--dark); color: white; padding: 60px 20px; text-align: center; margin-top: 50px; }
        .social-links { display: flex; justify-content: center; gap: 30px; margin-top: 30px; flex-wrap: wrap; }
        .social-box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            width: 150px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .social-box:hover { background: var(--gold); color: var(--dark); border-color: white; transform: translateY(-5px); }
        .social-box i { font-size: 2rem; display: block; margin-bottom: 10px; }

        footer { background: #000; color: #777; text-align: center; padding: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <img src="logo.jpg" alt="شعار الوحيدي" class="logo-img"> <h1>رابطة عشيرة الوحيدي</h1>
    <p>الموقع الرسمي - أخبار، مناسبات، تواصل</p>
</header>

<div class="container">
    <div class="news-section">
        <h2 class="section-title">آخر أخبار ومستجدات العائلة</h2>
        <div class="news-grid">
            <div class="news-item">
                <span style="color: var(--gold); font-weight: bold;">إعلان هام</span>
                <h3>انطلاق المنصة الرسمية</h3>
                <p>تم تدشين الموقع الرسمي لرابطة عشيرة الوحيدي ليكون المرجع الأول لأخبار العائلة.</p>
            </div>
            </div>
    </div>
</div>

<div class="contact-section">
    <h2>تواصل معنا (ديوان الرابطة)</h2>
    <p>يمكنكم التواصل مع إدارة الرابطة عبر القنوات التالية:</p>
    <div class="social-links">
