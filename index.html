<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع عشيرتي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            color: #333;
        }
        header {
            background: #1e3c5c;
            color: white;
            text-align: center;
            padding: 30px;
        }
        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
        }
        .section-title {
            color: #1e3c5c;
            border-right: 5px solid gold;
            padding-right: 10px;
            margin: 30px 0 20px;
        }
        .card {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        button {
            background: #1e3c5c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        .badge {
            background: gold;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>🌟 موقع العائلة</h1>
        <p>بإشراف: حسن وسام الوحيدي</p>
    </header>
    <div class="container">
        <h2 class="section-title">➕ إضافة منشور</h2>
        <input type="text" id="title" placeholder="العنوان">
        <input type="date" id="date">
        <textarea id="desc" placeholder="الوصف"></textarea>
        <button onclick="addPost()">أضف منشور</button>

        <h2 class="section-title">📄 المنشورات</h2>
        <div id="posts"></div>
    </div>

    <script>
        let posts = [];

        function showPosts() {
            const container = document.getElementById('posts');
            if (posts.length === 0) {
                container.innerHTML = "<p>لا توجد منشورات بعد</p>";
                return;
            }
            let html = '';
            posts.forEach((p, i) => {
                html += 
                    <div class="card">
                        <span class="badge">${p.date}</span>
                        <h3>${p.title}</h3>
                        <p>${p.desc}</p>
                        <button onclick="deletePost(${i})">حذف</button>
                    </div>
                ;
            });
            container.innerHTML = html;
        }

        function addPost() {
            const title = document.getElementById('title').value;
            const date = document.getElementById('date').value;
            const desc = document.getElementById('desc').value;
            if (!title  !date  !desc) {
                alert("املأ جميع الحقول");
                return;
            }
            posts.push({ title, date, desc });
            showPosts();
            document.getElementById('title').value = '';
            document.getElementById('desc').value = '';
        }

        function deletePost(i) {
            posts.splice(i, 1);
            showPosts();
        }

        showPosts();
    </script>
</body>
</html>
