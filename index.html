<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عشيرة الوحيدي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal',sans-serif; }
        body { background:#f4f7f6; }
        .header { background:#1a3a5f; color:white; padding:30px; text-align:center; border-bottom:5px solid #c5a059; }
        .header h1 { font-size:2.5rem; }
        .container { max-width:1000px; margin:20px auto; padding:15px; background:white; border-radius:15px; }
        .signature { background:#f0f3f7; padding:15px; border-radius:50px; text-align:center; margin-bottom:25px; }
        .signature span { color:#1a3a5f; font-weight:900; }
        .btns { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:30px; }
        .btns a { text-decoration:none; color:white; padding:15px; border-radius:10px; text-align:center; }
        .whatsapp { background:#25D366; }
        .facebook { background:#1877F2; }
        .call { background:#c5a059; }
        .section-title { color:#1a3a5f; font-size:1.8rem; border-right:5px solid #c5a059; padding-right:15px; margin:30px 0 20px; }
        .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:20px; }
        .card { background:#f9f9f9; padding:20px; border-radius:10px; }
        .badge { background:#c5a059; color:white; padding:5px 15px; border-radius:20px; display:inline-block; margin-bottom:10px; }
        .date { color:#1a3a5f; font-weight:bold; margin-bottom:10px; }
        .footer { background:#1a3a5f; color:white; text-align:center; padding:30px; margin-top:50px; }
        
        /* لوحة التحكم */
        #adminPanel { display:none; margin:20px 0; padding:20px; background:#f0f3f7; border-radius:10px; border:2px dashed #c5a059; }
        input, textarea { width:100%; padding:10px; margin:5px 0; border:1px solid #ddd; border-radius:5px; }
        button { background:#1a3a5f; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; margin:5px; }
        .delete-btn { background:#dc3545; }
    </style>
</head>
<body>
    <div class="header">
        <h1>عشيرة الوحيدي</h1>
        <p>بإشراف: حسن وسام الوحيدي</p>
    </div>
    
    <div class="container">
        <div class="signature">
            <i class="fas fa-user-shield"></i> إشراف: <span>حسن وسام الوحيدي</span>
        </div>
        
        <div class="btns">
            <a href="https://wa.me/+970567778040" class="whatsapp"><i class="fab fa-whatsapp"></i> واتساب</a>
            <a href="#" class="facebook"><i class="fab fa-facebook-f"></i> فيسبوك</a>
            <a href="tel:+970567778040" class="call"><i class="fas fa-phone"></i> اتصال</a>
        </div>
        
        <!-- لوحة التحكم -->
        <div id="adminPanel">
            <h3><i class="fas fa-cog"></i> لوحة التحكم</h3>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                <div>
                    <h4>➕ إضافة خبر</h4>
                    <input type="text" id="newsTitle" placeholder="العنوان">
                    <input type="date" id="newsDate">
                    <input type="text" id="newsCategory" placeholder="التصنيف" value="اجتماعات">
                    <textarea id="newsContent" placeholder="المحتوى" rows="3"></textarea>
                    <button onclick="addNews()">حفظ</button>
                </div>
                
                <div><input type="date" id="achDate">
                    <textarea id="achDesc" placeholder="الوصف" rows="3"></textarea>
                    <button onclick="addAchievement()">حفظ</button>
                </div>
            </div>
        </div>
        
        <!-- الأخبار -->
        <h2 class="section-title">📰 آخر الأخبار</h2>
        <div id="newsContainer" class="cards"></div>
        
        <!-- الإنجازات -->
        <h2 class="section-title">🏆 الإنجازات</h2>
        <div id="achievementsContainer" class="cards"></div>
    </div>
    
    <div class="footer">
        <p>جميع الحقوق محفوظة © ٢٠٢٦</p>
    </div>
    
    <script>
        let news = JSON.parse(localStorage.getItem('news')) || [];
        let achievements = JSON.parse(localStorage.getItem('achievements')) || [];
        
        // لوحة التحكم
        if (window.location.hash === '#admin') {
            document.getElementById('adminPanel').style.display = 'block';
        }
        
        function displayNews() {
            let html = '';
            news.forEach((item, i) => {
                html += <div class="card">
                    <span class="badge">${item.category}</span>
                    <div class="date">📅 ${item.date}</div>
                    <h3>${item.title}</h3>
                    <p>${item.content}</p>
                    <button class="delete-btn" onclick="deleteNews(${i})">حذف</button>
                </div>;
            });
            document.getElementById('newsContainer').innerHTML = html || '<p>لا توجد أخبار</p>';
        }
        
        function displayAchievements() {
            let html = '';
            achievements.forEach((item, i) => {
                html += <div class="card">
                    <div class="date">📅 ${item.date}</div>
                    <h3>${item.title}</h3>
                    <p>${item.description}</p>
                    <button class="delete-btn" onclick="deleteAchievement(${i})">حذف</button>
                </div>;
            });
            document.getElementById('achievementsContainer').innerHTML = html || '<p>لا توجد إنجازات</p>';
        }
        
        function addNews() {
            let title = document.getElementById('newsTitle').value;
            let date = document.getElementById('newsDate').value;
            let cat = document.getElementById('newsCategory').value;
            let content = document.getElementById('newsContent').value;
            if (!title  !date  !cat || !content) { alert('املأ الحقول'); return; }
            news.push({ title, date, category:cat, content });
            localStorage.setItem('news', JSON.stringify(news));
            displayNews();
            document.getElementById('newsTitle').value = '';
            document.getElementById('newsContent').value = '';
        }
        
        function addAchievement() {
            let title = document.getElementById('achTitle').value;
            let date = document.getElementById('achDate').value;
            let desc = document.getElementById('achDesc').value;
            if (!title  !date  !desc) { alert('املأ الحقول'); return; }
            achievements.push({ title, date, description:desc });
            localStorage.setItem('achievements', JSON.stringify(achievements));
            displayAchievements();
            document.getElementById('achTitle').value = '';
            document.getElementById('achDesc').value = '';
        }
        
        function deleteNews(i) {
            news.splice(i, 1);
            localStorage.setItem('news', JSON.stringify(news));
            displayNews();
        }
        
        function deleteAchievement(i) {
            achievements.splice(i, 1);
            localStorage.setItem('achievements', JSON.stringify(achievements));
            displayAchievements();
        }
        
        displayNews();
        displayAchievements();
    </script>
</body>
</html>
