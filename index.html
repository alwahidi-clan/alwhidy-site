<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عشيرة الوحيدي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal',sans-serif; }
        body { background:#f4f7f6; }
        .header { background:#1a3a5f; color:white; padding:30px; text-align:center; border-bottom:5px solid #c5a059; }
        .container { max-width:1000px; margin:20px auto; padding:15px; background:white; border-radius:15px; }
        .signature { background:#f0f3f7; padding:15px; border-radius:50px; text-align:center; margin-bottom:25px; }
        .signature span { color:#1a3a5f; font-weight:900; }
        .btns { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:30px; }
        .btns a { text-decoration:none; color:white; padding:15px; border-radius:10px; text-align:center; }
        .whatsapp { background:#25D366; }
        .facebook { background:#1877F2; }
        .call { background:#c5a059; }
        .section-title { color:#1a3a5f; font-size:1.8rem; border-right:5px solid #c5a059; padding-right:15px; margin:30px 0 20px; }
        .news-item { background:#f9f9f9; padding:15px; margin-bottom:15px; border-radius:10px; border-right:4px solid #c5a059; }
        .footer { background:#1a3a5f; color:white; text-align:center; padding:30px; margin-top:50px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>عشيرة الوحيدي</h1>
        <p>بإشراف: حسن وسام الوحيدي</p>
    </div>
    
    <div class="container">
        <div class="signature">
            <i class="fas fa-user-shield"></i> إشراف: <span>حسن وسام الوحيدي</span>
        </div>
        
        <div class="btns">
            <a href="https://wa.me/+970567778040" class="whatsapp"><i class="fab fa-whatsapp"></i> واتساب</a>
            <a href="#" class="facebook"><i class="fab fa-facebook-f"></i> فيسبوك</a>
            <a href="tel:+970567778040" class="call"><i class="fas fa-phone"></i> اتصال</a>
        </div>
        
        <h2 class="section-title">📰 آخر الأخبار</h2>
        <div id="news"></div>
        
        <h2 class="section-title">🏆 الإنجازات</h2>
        <div id="achievements"></div>
    </div>
    
    <div class="footer">
        <p>جميع الحقوق محفوظة © ٢٠٢٦</p>
    </div>

    <script>
        // ===== هنا بتعدل على الأخبار والإنجازات =====
        const news = [
            { date: "2026-01-01", title: "اجتماع العشيرة السنوي", content: "سيتم عقد الاجتماع السنوي في مقر الديوان" },
            { date: "2026-01-15", title: "تهاني بمناسبة العام الجديد", content: "تتقدم إدارة الموقع بأصدق التهاني" },
            { date: "2026-02-20", title: "إطلاق الموقع الجديد", content: "يسرنا إطلاق الموقع الرسمي الجديد للعشيرة" }
        ];
        
        const achievements = [
            { date: "2024-03-15", title: "تأسيس ديوان العشيرة", desc: "تم بحمد الله افتتاح ديوان عشيرة الوحيدي" },
            { date: "2025-01-01", title: "لم الشمل السنوي", desc: "أكبر تجمع سنوي لأبناء العشيرة" },
            { date: "2025-02-10", title: "تكريم المتفوقين", desc: "تكريم ٢٥ طالباً من المتفوقين" }
        ];
        
        // ===== عرض البيانات (لا تغير شيء تحت) =====
        function showNews() {
            let html = '';
            news.forEach(item => {
                html += `<div class="news-item">
                    <div style="color:#c5a059;">📅 ${new Date(item.date).toLocaleDateString('ar-EG')}</div>
                    <h3>${item.title}</h3>
                    <p>${item.content}</p>
                </div>`;
            });
            document.getElementById('news').innerHTML = html;
        }
        
        function showAchievements() {
            let html = '';
            achievements.forEach(item => {
                html += `<div class="news-item">
                    <div style="color:#c5a059;">📅 ${new Date(item.date).toLocaleDateString('ar-EG')}</div>
                    <h3>${item.title}</h3>
                    <p>${item.desc}</p>
                </div>`;
            });
            document.getElementById('achievements').innerHTML = html;
        }
        
        showNews();
        showAchievements();
    </script>
</body>
</html>
