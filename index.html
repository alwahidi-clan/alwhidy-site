<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رابطة عشيرة الوحيدي | الموقع الرسمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ألوان متناسقة مع البانر الجديد (6919) */
            --primary: #1e3a8a; /* كحلي متناسق مع البانر */
            --accent: #c6a360;  /* ذهبي متناسق مع الشعار */
            --text-light: #f1f5f9;
            --card-bg: rgba(20, 25, 35, 0.85);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0f172a; /* خلفية غامقة لإبراز المحتوى */
            color: var(--text-light);
            margin: 0;
            padding: 0;
        }

        /* الهيدر مع البانر الجديد (6919) */
        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* استخدام البانر المرفق كخلفية */
            background: linear-gradient(to bottom, rgba(30, 58, 138, 0.7), rgba(15, 23, 42, 0.9)), 
                        url('https://alwahidi-clan.github.io/alwhidy-site/baner.jpg'); 
            background-size: cover;
            background-position: center;
            border-bottom: 2px solid var(--accent);
        }

        /* الشعار الجديد (6918) فوق الاسم */
        .logo {
            width: 150px; /* حجم متناسق للشعار */
            height: auto;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 0;
            /* نص ترحيبي متناسق */
            background: linear-gradient(to right, #fff, var(--accent), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1200px;
            margin: -50px auto 50px auto;
            padding: 0 20px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(198, 163, 96, 0.3);
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-10px); border-color: var(--accent); }

        .card img {
            width: 100%;
            height: 230px;
            object-fit: cover;
        }

        .card-body { padding: 25px; }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: var(--accent);
            color: #0f172a;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        footer { 
            text-align: center; 
            padding: 40px 0; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            background-color: #0a0f1e;
        }
    </style>
</head>
<body>

<header>
    <img src="https://alwahidi-clan.github.io/alwhidy-site/logo.jpg" alt="شعار رابطة عشيرة الوحيدي" class="logo">
    <h1>رابطة عشيرة الوحيدي</h1>
    <p style="color: var(--accent); letter-spacing: 2px; margin-top: 10px;">أهلاً بكم في الموقع الرسمي</p>
</header>

<div class="container">
    <div class="news-grid">
        <div class="card">
            <img src="https://images.pexels.com/photos/1996333/pexels-photo-1996333.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1" alt="خيل عربي">
            <div class="card-body">
                <span style="color: var(--accent); font-size: 0.8rem;">تراث وأصالة</span>
                <h3>سباقات الفروسية السنوية</h3>
                <p>تستعد الرابطة لإطلاق سباق الخيل السنوي الذي يجمع أبناء العشيرة في تظاهرة رياضية وتراثية كبرى.</p>
                <a href="#" class="btn">التفاصيل</a>
            </div>
        </div>
