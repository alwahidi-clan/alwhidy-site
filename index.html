<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع الرسمي لعشيرة الوحيدي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a3a5f; --gold: #c5a059; --bg: #f8f9fa; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); margin: 0; color: #333; }
        
        /* البانر العلوي */
        header { 
            background: linear-gradient(rgba(26, 58, 95, 0.7), rgba(26, 58, 95, 0.7)), url('images/banner.jpg'); 
            background-size: cover; background-position: center;
            color: white; padding: 80px 20px; text-align: center; border-bottom: 6px solid var(--gold);
        }
        
        /* اللوجو (الشعار) */
        .logo-img {
            width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--gold);
            margin-bottom: 15px; background: white; object-fit: contain;
        }

        h1 { font-weight: 900; font-size: 2.8em; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        .container { max-width: 1000px; margin: -40px auto 20px; padding: 30px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; }
        
        /* خانة التوثيق (بصمتك) */
        .signature-box {
            background: linear-gradient(135deg, var(--primary), #2c5282);
            color: white; padding: 15px; border-radius: 10px; margin-bottom: 30px;
            text-align: center; border-right: 8px solid var(--gold);
        }
        .signature-box span { color: var(--gold); font-weight: bold; font-size: 1.2em; }

        /* أزرار التواصل */
        .contact-bar { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .btn { 
            text-decoration: none; color: white; padding: 12px 25px; border-radius: 50px; 
            font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .whatsapp { background-color: #25D366; } .facebook { background-color: #1877F2; } .call { background-color: var(--gold); }
        .btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .news-section h2 { color: var(--primary); border-bottom: 2px solid var(--gold); display: inline-block; padding-bottom: 5px; }
        
        footer { text-align: center; padding: 40px; background: var(--primary); color: #ccc; margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <img src="images/logo.jpg" alt="شعار العشيرة" class="logo-img">
    <h1>موقع عشيرة الوحيدي الرسمي</h1>
    <p>أصالة، عراقة، وتواصل مستمر</p>
</header>

<div class="container">
    <div class="signature-box">
        <i class="fas fa-check-circle"></i> تنفيذ وإشراف: <span>حسن وسام الوحيدي</span>
    </div>

    <div class="contact-bar">
        <a href="https://wa.me/972590000000" class="btn whatsapp"><i class="fab fa-whatsapp"></i> واتساب</a>
        <a href="#" class="btn facebook"><i class="fab fa-facebook-f"></i> فيسبوك</a>
        <a href="tel:0590000000" class="btn call"><i class="fas fa-phone-alt"></i> اتصل بنا</a>
    </div>

    <div class="news-section">
        <h2><i class="fas fa-newspaper"></i> آخر أخبار العشيرة ٢٠٢٦</h2>
        <div id="content">
            <p style="text-align:center; padding:50px; color:#999;">بانتظار إضافة أخبار جديدة في مجلد _news...</p>
        </div>
    </div>
</div>

<footer>
    <p>جميع الحقوق محفوظة © ٢٠٢٦ | شبكة أخبار عشيرة الوحيدي</p>
    <p style="font-size: 0.8em; opacity: 0.7;">تطوير وإدارة: حسن وسام الوحيدي</p>
</footer>

</body>
</html>
