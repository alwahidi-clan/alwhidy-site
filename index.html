<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عشيرة الوحيدي - الموقع الرسمي</title>
    <meta name="google" content="notranslate">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: #f4f7f6; }
        
        /* الهيدر */
        .header {
            background: linear-gradient(135deg, #1a3a5f, #0f2a44);
            color: white; padding: 50px 20px; text-align: center;
            border-bottom: 5px solid #c5a059;
        }
        .header h1 { font-size: 3rem; margin-bottom: 10px; }
        .header p { font-size: 1.3rem; opacity: 0.9; }
        
        /* الحاوية */
        .container { max-width: 1200px; margin: -30px auto 40px; padding: 0 20px; }
        
        /* بطاقة الإشراف */
        .signature {
            background: white; padding: 20px; border-radius: 50px; text-align: center;
            margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            font-size: 1.3rem; border: 2px solid #c5a059;
        }
        .signature i { color: #c5a059; }
        .signature span { color: #1a3a5f; font-weight: 900; font-size: 1.5rem; }
        
        /* أزرار التواصل */
        .social {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
            margin-bottom: 40px;
        }
        .social a {
            text-decoration: none; color: white; padding: 18px; border-radius: 15px;
            text-align: center; font-weight: bold; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .social a:hover { transform: translateY(-3px); }
        .whatsapp { background: #25D366; }
        .facebook { background: #1877F2; }
        .call { background: #c5a059; }
        
        /* أقسام الصفحة */
        .section-title {
            color: #1a3a5f; font-size: 2.2rem; font-weight: 900; margin: 40px 0 25px;
            border-right: 8px solid #c5a059; padding-right: 20px;
            display: flex; align-items: center; gap: 10px;
        }
        
        /* شبكة البطاقات */
        .cards-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px; margin-bottom: 40px;
        }
        
        .card {
            background: white; border-radius: 20px; padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08); border: 1px solid #eee;
            transition: 0.3s; position: relative;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
        
        .badge {
            background: #c5a059; color: white; padding: 8px 20px; border-radius: 30px;
            display: inline-block; margin-bottom: 15px; font-weight: bold;
        }
        
        .date {
            color: #1a3a5f; font-weight: bold; margin-bottom: 15px;
            display: flex; align-items: center; gap: 5px;
        }
        
        .card h3 { color: #1a3a5f; font-size: 1.5rem; margin-bottom: 10px; }
        .card p { color: #555; line-height: 1.8; font-size: 1.1rem; }
        
        /* زر الحذف */
        .delete-btn {
            background: #dc3545; color: white; border: none;
            padding: 8px 15px; border-radius: 8px; cursor: pointer;
            font-weight: bold; margin-top: 15px; display: inline-flex;
            align-items: center; gap: 5px; transition: 0.3s;}
        .delete-btn:hover { background: #c82333; }
        
        /* معرض الصور */
        .gallery {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px; margin: 30px 0;
        }
        .gallery-item {
            background: #e9ecef; border-radius: 15px; height: 150px;
            display: flex; align-items: center; justify-content: center;
            border: 3px dashed #c5a059; color: #666; font-size: 1.1rem;
            cursor: pointer; transition: 0.3s;
        }
        .gallery-item:hover { background: #c5a059; color: white; }
        
        /* الفوتر */
        .footer {
            background: #1a3a5f; color: white; text-align: center;
            padding: 40px; margin-top: 60px;
        }
        .footer p { margin: 10px 0; opacity: 0.9; font-size: 1.1rem; }
        
        /* تصميم متجاوب */
        @media (max-width: 768px) {
            .header h1 { font-size: 2rem; }
            .section-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🌟 عشيرة الوحيدي</h1>
    <p>نسب عريق - حاضر مشرق - مستقبل واعد</p>
</div>

<div class="container">
    
    <div class="signature">
        <i class="fas fa-crown"></i> إشراف وتنفيذ: <span>حسن وسام الوحيدي</span>
    </div>
    
    <div class="social">
        <a href="https://wa.me/972590000000" class="whatsapp"><i class="fab fa-whatsapp"></i> واتساب</a>
        <a href="#" class="facebook"><i class="fab fa-facebook-f"></i> فيسبوك</a>
        <a href="tel:0590000000" class="call"><i class="fas fa-phone"></i> اتصال</a>
    </div>
    
    <!-- ===== الإنجازات ===== -->
    <h2 class="section-title"><i class="fas fa-trophy" style="color: #c5a059;"></i> إنجازات العشيرة</h2>
    <div id="achievements" class="cards-grid"></div>
    
    <!-- ===== الأخبار ===== -->
    <h2 class="section-title"><i class="fas fa-newspaper" style="color: #c5a059;"></i> آخر الأخبار</h2>
    <div id="news" class="cards-grid"></div>
    
    <!-- ===== معرض الصور ===== -->
    <h2 class="section-title"><i class="fas fa-images" style="color: #c5a059;"></i> معرض الصور</h2>
    <div class="gallery">
        <div class="gallery-item"><i class="fas fa-plus"></i> إضافة صورة</div>
        <div class="gallery-item"><i class="fas fa-plus"></i> إضافة صورة</div>
        <div class="gallery-item"><i class="fas fa-plus"></i> إضافة صورة</div>
        <div class="gallery-item"><i class="fas fa-plus"></i> إضافة صورة</div>
    </div>
    
</div>

<div class="footer">
    <p>جميع الحقوق محفوظة © ١٤٤٧ هـ - ٢٠٢٦ م</p>
    <p>بإدارة: حسن وسام الوحيدي</p>
    <p style="font-size: 1rem; margin-top: 15px;">
        <i class="fas fa-heart" style="color: #c5a059;"></i> نسألكم الدعاء
    </p>
</div>

<script>
// ===== البيانات الثابتة (عدل عليها براحتك) =====
const achievementsData = [
    {
        title: "تأسيس الصفحة الإلكترونية للعشيرة",
        date: " 5/3/ 2026",
       
    
    {
      
  
];

const newsData = [
    {
        category: "اجتماعات",
        date: "18/فبراير/2026",
        title: "اجتماع اللجنة الإغاثية",
        content: "تعقد اللجنة الإغاثية اجتماعها الدوري لمناقشة فعاليات شهر رمضان المبارك."
    },
   
   
];// ===== عرض البيانات =====
function displayAchievements() {
    let html = '';
    achievementsData.forEach(item => {
        html += 
            <div class="card">
                <div class="badge"><i class="far fa-calendar-alt"></i> ${item.date}</div>
                <h3>${item.title}</h3>
                <p>${item.desc}</p>
            </div>
        ;
    });
    document.getElementById('achievements').innerHTML = html;
}

function displayNews() {
    let html = '';
    newsData.forEach(item => {
        html += 
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <span class="badge">${item.category}</span>
                    <span class="date"><i class="far fa-calendar-alt"></i> ${item.date}</span>
                </div>
                <h3>${item.title}</h3>
                <p>${item.content}</p>
            </div>
        ;
    });
    document.getElementById('news').innerHTML = html;
}

// ===== تشغيل العرض =====
displayAchievements();
displayNews();
</script>

</body>
</html>
