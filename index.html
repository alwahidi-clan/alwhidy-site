<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع الرسمي لعشيرة الوحيدي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            color: #333;
        }
        header {
            background-color: #1a3a5f; /* لون كحلي ملكي */
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 5px solid #c5a059; /* خط ذهبي */
        }
        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { margin: 0; font-size: 2.5em; }
        .news-section { margin-top: 30px; }
        .news-card {
            border-right: 4px solid #1a3a5f;
            padding: 15px;
            margin-bottom: 20px;
            background: #fafafa;
            transition: 0.3s;
        }
        .news-card:hover { background: #f0f4f8; }
        footer {
            text-align: center;
            padding: 30px;
            background: #1a3a5f;
            color: #ddd;
            margin-top: 50px;
        }
        .signature {
            color: #c5a059; /* لون ذهبي للاسم */
            font-weight: bold;
            font-size: 1.1em;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>موقع عشيرة الوحيدي</h1>
    <p>المنبر الرسمي لأخبار ومناسبات العشيرة</p>
</header>

<div class="container">
    <div class="news-section">
        <h2>آخر الأخبار والمستجدات لعام ٢٠٢٦</h2>
        <hr>
        <div id="content">
            <p>جاري تحميل الأخبار...</p>
        </div>
    </div>
</div>

<footer>
    <p>جميع الحقوق محفوظة © ٢٠٢٦ | شبكة أخبار عشيرة الوحيدي</p>
    <div class="signature">تنفيذ وإشراف: حسن وسام الوحيدي</div>
</footer>

</body>
</html>
